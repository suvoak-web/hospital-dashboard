<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โรงพยาบาลพระทองคำเฉลิมพระเกียรติ 80 พรรษา</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #F4F6F9;
  --surface: #FFFFFF;
  --surface2: #F0F3F7;
  --border: #E2E8F0;
  --text: #1A2332;
  --muted: #64748B;
  --accent: #1D6FA4;
  --accent-dim: rgba(29,111,164,0.08);
  --green: #16A34A;
  --amber: #B45309;
  --red: #DC2626;
  --purple: #7C3AED;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow: 0 4px 12px rgba(0,0,0,.07);
  --shadow-md: 0 8px 24px rgba(0,0,0,.09);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

/* HEADER */
header {
  background: var(--accent);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 1.5px solid rgba(255,255,255,0.3);
}
#clock { color: #fff; font-size: 17px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }

/* SIDEBAR */
.sidebar {
  position: fixed; left: 0; top: 70px; bottom: 0;
  width: 260px; background: var(--surface);
  border-right: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.3s ease;
  z-index: 150; overflow-y: auto; padding-top: 20px;
}
.sidebar.collapsed { transform: translateX(-100%); }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; color: var(--muted); text-decoration: none;
  font-weight: 600; border-radius: 8px; margin: 4px 12px;
}
.nav-item:hover, .nav-item.active {
  background: var(--accent-dim); color: var(--accent);
}

/* MAIN */
.main-content {
  margin-left: 260px; padding: 20px 28px 40px;
  max-width: 1400px;
}
@media (max-width: 992px) {
  .main-content { margin-left: 0; padding: 16px; }
}

/* Dashboard Styles */
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 18px; }
.dash-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 22px 24px; box-shadow: var(--shadow-sm); text-decoration: none; color: var(--text);
  display: flex; flex-direction: column; gap: 14px;
  border-top: 3px solid var(--accent);
}
.dash-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
.dash-icon { font-size: 28px; }
.dash-arrow { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 700; }

.mini-kpi-row { display: flex; gap: 10px; flex-wrap: wrap; }
.mini-kpi { flex: 1; min-width: 100px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.mini-kpi-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
.mini-kpi-value { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; line-height: 1; }
.mini-kpi.green .mini-kpi-value { color: var(--green); }
.mini-kpi.red .mini-kpi-value { color: var(--red); }
.mini-kpi.amber .mini-kpi-value { color: var(--amber); }
.mini-kpi.purple .mini-kpi-value { color: var(--purple); }

.dash-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
.dash-cta { color: var(--accent); font-weight: 700; }

/* Links Section */
.links-section { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.link-group {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden; box-shadow: var(--shadow-sm);
}
.link-group-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface2); display: flex; align-items: center; gap: 8px;
}
.link-group-title { font-size: 13px; font-weight: 700; }
.link-group-sub { font-size: 11px; color: var(--muted); }

.link-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  text-decoration: none; color: var(--text);
}
.link-item:last-child { border-bottom: none; }
.link-item:hover { background: var(--accent-dim); }
.link-item:hover .link-name { color: var(--accent); }

.link-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  flex-shrink: 0; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.link-name { font-size: 13px; font-weight: 600; flex: 1; }
.link-desc { font-size: 11px; color: var(--muted); }
.link-ext { font-size: 11px; color: var(--muted); }

@media (max-width: 700px) {
  .links-section, .dash-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button onclick="toggleSidebar()" style="background:none;border:none;color:white;font-size:28px;cursor:pointer;margin-right:8px;">☰</button>
    <div class="logo-mark">🏥</div>
    <div>
      <div class="header-title">โรงพยาบาลพระทองคำเฉลิมพระเกียรติ 80 พรรษา</div>
      <div class="header-sub">ระบบติดตามข้อมูลโรงพยาบาล</div>
    </div>
  </div>
  <div id="clock">--:--:--</div>
</header>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">
  <a href="index.html" class="nav-item active">🏠 หน้าหลัก</a>
  <a href="kpi_dashboard.html" class="nav-item">📊 KPI Dashboard</a>
  <a href="opwalkin.html" class="nav-item">💰 พึงรับ-พึงจ่าย OP Walk-in</a>
  <a href="compare.html" class="nav-item">⏱ เปรียบเทียบระยะเวลารอคอย</a>
</aside>

<!-- MAIN CONTENT -->
<div class="main-content">
<main>
  <!-- DASHBOARD SHORTCUTS -->
  <div>
    <div class="section-label">Dashboard ที่พร้อมใช้งาน</div>
    <div class="dash-grid">
      <!-- การ์ดทั้ง 3 อันของคุณ (เหมือนเดิม) -->
      <!-- ... วางการ์ด OP, Compare, KPI ตรงนี้ ... -->
    </div>
  </div>

  <!-- EXTERNAL LINKS -->
  <div>
    <div class="section-label">ลิงก์ระบบภายนอก</div>
    <div class="links-section">
      <!-- ลิงก์กลุ่ม 1 และ 2 เดิมของคุณ (คัดลอกไว้เหมือนเดิม) -->
    </div>
  </div>
</main>
</div>

<script>
// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(updateClock, 10000);
updateClock();

// Toggle Sidebar
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
</script>
</body>
</html>
